<div class="register-container">
  <div class="register-card">
    <h2>Înregistrare</h2>
    <p class="subtitle">Creează un cont nou</p>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">Prenume</label>
          <input 
            type="text" 
            id="firstName" 
            formControlName="firstName"
            [class.error]="firstName?.invalid && firstName?.touched"
            placeholder="Ion">
          <div class="error-message" *ngIf="firstName?.invalid && firstName?.touched">
            <span *ngIf="firstName?.errors?.['required']">Prenumele este obligatoriu</span>
          </div>
        </div>

        <div class="form-group">
          <label for="lastName">Nume</label>
          <input 
            type="text" 
            id="lastName" 
            formControlName="lastName"
            [class.error]="lastName?.invalid && lastName?.touched"
            placeholder="Popescu">
          <div class="error-message" *ngIf="lastName?.invalid && lastName?.touched">
            <span *ngIf="lastName?.errors?.['required']">Numele este obligatoriu</span>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email"
          [class.error]="email?.invalid && email?.touched"
          placeholder="exemplu@email.com">
        <div class="error-message" *ngIf="email?.invalid && email?.touched">
          <span *ngIf="email?.errors?.['required']">Email-ul este obligatoriu</span>
          <span *ngIf="email?.errors?.['email']">Email invalid</span>
        </div>
      </div>

      <div class="form-group">
        <label for="phoneNumber">Telefon (opțional)</label>
        <input 
          type="tel" 
          id="phoneNumber" 
          formControlName="phoneNumber"
          placeholder="+40712345678">
      </div>

      <div class="form-group">
        <label for="password">Parolă</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password"
          [class.error]="password?.invalid && password?.touched"
          placeholder="Minim 6 caractere">
        <div class="error-message" *ngIf="password?.invalid && password?.touched">
          <span *ngIf="password?.errors?.['required']">Parola este obligatorie</span>
          <span *ngIf="password?.errors?.['minlength']">Parola trebuie să aibă minim 6 caractere</span>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmă Parola</label>
        <input 
          type="password" 
          id="confirmPassword" 
          formControlName="confirmPassword"
          [class.error]="(confirmPassword?.invalid && confirmPassword?.touched) || passwordMismatch"
          placeholder="Introdu din nou parola">
        <div class="error-message" *ngIf="confirmPassword?.invalid && confirmPassword?.touched">
          <span *ngIf="confirmPassword?.errors?.['required']">Confirmarea parolei este obligatorie</span>
        </div>
        <div class="error-message" *ngIf="passwordMismatch">
          Parolele nu se potrivesc
        </div>
      </div>

      <div class="error-message" *ngIf="error">
        {{ error }}
      </div>

      <button type="submit" class="btn-register" [disabled]="loading">
        <span *ngIf="!loading">Înregistrare</span>
        <span *ngIf="loading">Se încarcă...</span>
      </button>
    </form>

    <div class="login-link">
      Ai deja cont? <a routerLink="/login">Autentifică-te</a>
    </div>
  </div>
</div>
