<div class="container mx-auto p-4 max-w-2xl">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold text-gray-800">Notificările Tale</h2>
    
<div class="action-buttons" *ngIf="notifications.length > 0">
      <button (click)="markAllRead()" class="btn-pill btn-blue">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
        Marchează tot ca citit
      </button>
      
      <button (click)="deleteAll()" class="btn-pill btn-red">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
        Șterge tot
      </button>
    </div>

  <div *ngIf="isLoading" class="text-center py-8">
    <p class="text-gray-500">Se încarcă notificările...</p>
  </div>

  <div *ngIf="errorMessage && !isLoading" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4">
    {{ errorMessage }}
  </div>

  <div *ngIf="!isLoading && notifications.length === 0 && !errorMessage" class="text-center py-12 bg-gray-50 rounded-lg">
    <p class="text-gray-500 text-lg">Nu ai nicio notificare momentan.</p>
  </div>

  <div *ngIf="!isLoading && notifications.length > 0" class="space-y-3">
    <div *ngFor="let notification of notifications" 
         (click)="markAsRead(notification)"
         [class.bg-blue-50]="!notification.isRead"
         [class.bg-white]="notification.isRead"
         class="p-4 rounded-lg shadow-sm border border-gray-200 cursor-pointer transition-colors hover:shadow-md relative group">
      
      <div class="flex justify-between items-start">
        <div class="flex-1 pr-8">
          <p class="text-gray-800" [class.font-semibold]="!notification.isRead">
            {{ notification.message }}
          </p>
          
          <div class="mt-2 flex items-center gap-2 text-xs text-gray-500">
            <span>{{ notification.sentAt | date:'dd MMM yyyy, HH:mm' }}</span>
            <span *ngIf="notification.type" class="px-2 py-0.5 bg-gray-200 rounded-full text-gray-700 font-medium text-[10px]">
              {{ notification.type }}
            </span>
          </div>
        </div>

        <button (click)="deleteNotification(notification.notificationId, $event)"
                class="absolute top-2 right-2 p-1.5 text-gray-400 hover:text-red-600 opacity-0 group-hover:opacity-100 transition-opacity"
                title="Șterge notificarea">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
        
        <span *ngIf="!notification.isRead" class="absolute top-4 right-4 h-2 w-2 bg-blue-600 rounded-full"></span>
      </div>
    </div>
  </div>
</div>
